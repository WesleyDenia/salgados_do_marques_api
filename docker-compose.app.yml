version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: salgados-app
    restart: unless-stopped
    expose:
      - "9000"
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
      - ./docker/conf/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    secrets:
      - db_password
      - mail_password
      - vendus_api_key      
      - google_api_key
      - whatsapp_token
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://api.salgadosdomarques.pt
      DB_PASSWORD_FILE: /run/secrets/db_password
      MAIL_PASSWORD_FILE: /run/secrets/mail_password
      VENDUS_API_KEY_FILE: /run/secrets/vendus_api_key      
      GOOGLE_API_KEY_FILE: /run/secrets/google_api_key
      WHATSAPP_TOKEN: /run/secrets/whatsapp_token
      WHATSAPP_BASE_URL: http://salgados-whatsapp:3000
    networks:
      - backend

  nginx:
    image: nginx:latest
    container_name: salgados-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html
      - ./docker/conf/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - backend

secrets:
  db_password:
    file: ./docker/secrets/db_password.txt
  mail_password:
    file: ./docker/secrets/mail_password.txt
  vendus_api_key:
    file: ./docker/secrets/vendus_api_key.txt  
  google_api_key:
    file: ./docker/secrets/google_api_key.txt
  whatsapp_token:
    file: ./docker/secrets/whatsapp_token.txt

networks:
  backend:
    external: true
    name: salgados_backend_net
